  /usr/lib/aarch64-linux-gnu/libxcb.so.1.1.0:
    symlink: $SNAP/graphics/usr/lib/aarch64-linux-gnu/libxcb.so.1.1.0
  /usr/lib/aarch64-linux-gnu/libxcb.so:
