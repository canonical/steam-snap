  /usr/lib/aarch64-linux-gnu/libVkLayer_MESA_device_select.so:
    symlink: $SNAP/graphics/usr/lib/aarch64-linux-gnu/libVkLayer_MESA_device_select.so
  /usr/lib/aarch64-linux-gnu/libVkLayer_MESA_overlay.so:
    symlink: $SNAP/graphics/usr/lib/aarch64-linux-gnu/libVkLayer_MESA_overlay.so
  /usr/share/vulkan:
    bind: $SNAP/graphics/usr/share/vulkan
  /etc/ld.so.cache:
    bind-file: $SNAP_DATA/etc/ld.so.cache
  /etc/fonts:
    bind: $SNAP/etc/fonts
  /usr/share/fex-emu:
    bind: $SNAP/usr/share/fex-emu
  /usr/lib/aarch64-linux-gnu/fex-emu:
    bind: $SNAP/usr/lib/aarch64-linux-gnu/fex-emu
  /usr/lib/pressure-vessel/overrides/lib/aarch64-linux-gnu/fex-emu:
    bind: $SNAP/usr/lib/aarch64-linux-gnu/fex-emu

plugs:
  gaming-graphics-core24:
    interface: content
    target: $SNAP/graphics
    default-provider: gaming-graphics-core24
  gtk-3-themes:
    interface: content
    target: $SNAP/share/themes
    default-provider: gtk-common-themes
  icon-themes:
    interface: content
    target: $SNAP/share/icons
    default-provider: gtk-common-themes
  sound-themes:
    interface: content
    target: $SNAP/share/sounds
    default-provider: gtk-common-themes
  dot-local-share-steam:
    interface: personal-files
    write:
      - $HOME/.local/share/Steam
      - $HOME/Steam
  dot-local-share-applications:
    interface: personal-files
    write:
      - $HOME/.local/share/applications
  dot-local-share-icons:
    interface: personal-files
    write:
      - $HOME/.local/share/icons
  desktop:
    mount-host-font-cache: false
  shmem:
    interface: shared-memory
    private: true

slots:
  steam:
    interface: dbus
    bus: session
    name: com.steampowered.PressureVessel.LaunchAlongsideSteam

hooks:
  configure:
    plugs:
      - opengl

environment:
  LD_LIBRARY_PATH: $SNAP/graphics/usr/lib/aarch64-linux-gnu:$SNAP/graphics/usr/lib:$SNAP/usr/lib/aarch64-linux-gnu:$SNAP/usr/lib/aarch64-linux-gnu:$SNAP/lib/aarch64-linux-gnu:$SNAP/usr/lib/aarch64-linux-gnu/pulseaudio${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}
  LIBGL_DRIVERS_PATH: $SNAP/graphics/usr/lib/aarch64-linux-gnu/dri:$SNAP/graphics/usr/lib/aarch64-linux-gnu/dri:${LIBGL_DRIVERS_PATH:+:$LIBGL_DRIVERS_PATH}
  GI_TYPELIB_PATH: $SNAP/usr/lib/aarch64-linux-gnu/girepository-1.0
  PYTHONPATH: $SNAP/usr/lib/python3/dist-packages

parts:
  gaming-graphics-core24:
    plugin: nil
    build-snaps:
      - gaming-graphics-core24
  amd64-content:
    plugin: dump
    source: https://github.com/MitchellAugustin/steam-snap/releases/download/amd64-components-1-26-26/steam_231_amd64.tar.gz
    stage:
      - -usr/bin/curl
      - -usr/bin/fc-cache
      - -usr/bin/fc-cat
      - -usr/bin/fc-conflist
      - -usr/bin/fc-list
      - -usr/bin/fc-match
      - -usr/bin/fc-pattern
      - -usr/bin/fc-query
      - -usr/bin/fc-scan
      - -usr/bin/fc-validate
      - -usr/bin/gtk-update-icon-cache
      - -usr/bin/update-mime-database
      - -usr/bin/zenity
      - -usr/libexec/dconf-service
      - -usr/share/doc/libcups2t64/changelog.Debian.gz
      - -bin/desktop-launch
      - -usr/share/doc/libavahi-common-data/changelog.Debian.gz
      - -usr/bin/cpp-13
      - -usr/bin/fuser
      - -usr/bin/iceauth
      - -usr/bin/killall
      - -usr/bin/lsof
      - -usr/bin/lspci
      - -usr/bin/lsusb
      - -usr/bin/peekfd
      - -usr/bin/prtstat
      - -usr/bin/pslog
      - -usr/bin/pstree
      - -usr/bin/sessreg
      - -usr/bin/setpci
      - -usr/bin/showrgb
      - -usr/bin/usbhid-dump
      - -usr/bin/usbreset
      - -usr/bin/xcmsdb
      - -usr/bin/xdg-user-dirs-update
      - -usr/bin/xgamma
      - -usr/bin/xhost
      - -usr/bin/xmodmap
      - -usr/bin/xrandr
      - -usr/bin/xrdb
      - -usr/bin/xrefresh
      - -usr/bin/xset
      - -usr/bin/xsetmode
      - -usr/bin/xsetpointer
      - -usr/bin/xsetroot
      - -usr/bin/xstdcmap
      - -usr/bin/xvidtune
      - -60-steam-input.rules
      - -60-steam-vr.rules
      - -usr/share/doc/libavahi-common-data/changelog.Debian.gz
      - -usr/share/doc/libtiff6/changelog.Debian.gz
    organize:
        steam_231_amd64: .
  amd64-rootfs:
    plugin: dump
    source: https://github.com/MitchellAugustin/steam-snap/releases/download/amd64-components-3-3-26-2/amd64_rootfs.tar.gz
    organize:
        amd64_rootfs: .
  fex-emu:
    plugin: nil
    stage-packages:
      - fex-emu-armv8.0
      - fex-emu-wine
      - zenity
  fex-config:
    plugin: dump
    source: ./fex_config
  wget:
    plugin: nil
    stage-packages:
      - wget
  desktop-launch:
    plugin: dump
    source: ./src/
    organize:
        desktop-launch: bin/
    stage:
      - bin/desktop-launch
  steam-devices:
    plugin: dump
    source: https://github.com/ValveSoftware/steam-devices.git
  steam:
    plugin: nil
    build-packages:
      - dpkg-dev
      - dirmngr # Needed for launchpad builds
    build-snaps:
      - core24
    stage-packages:
      - libappindicator3-1
      - libxcb-dri3-0
      - xkb-data
      - libpci3
      - libvulkan1
      - libxml2
      - libicu74
      - zlib1g
      - xdg-utils
      - xdg-user-dirs
      - fontconfig-config
      - fontconfig
      - pciutils
      - lsof
      - locales-all
      - usbutils # Allows finding controllers etc
      - psmisc
      - libfuse2
      - libxss1
      - x11-xserver-utils
      - libxtst6
      - libibus-1.0-5
      - libxrandr2
      - libxi6
      - libpipewire-0.3-0t64
      - libopenal1
      - libpulse0
      - libnm0
      - libglib2.0-0t64
      - libxfixes3
      - libgtk2.0-0t64
      - libxcb-res0
      - liblzma5
      - libice6
      - libsm6
      - libsdl2-2.0-0
      - libaom3
      - libavcodec60
      - libavutil58
      - libdav1d7
      - libswscale7
      - libvpx9
    prime:
      - -usr/include
      - -usr/share/doc
      - -usr/share/man
      - -usr/share/bug
      - -usr/share/gdb
      - -usr/share/emacs*
      - -usr/share/lintian
      - -usr/share/drirc.d
      - -usr/share/vulkan
      - -usr/share/Xsession.d
      - -usr/lib/*/dri
      - -usr/lib/*/vdpau
      - -usr/lib/*/libvkd3d*
      - -usr/lib/*/libvulkan*
      - -usr/lib/*/libVk*
      - -usr/lib/*/libLLVM*
      - -usr/lib/*/libgallium* # provided by gaming-graphics-core24
      - -usr/lib/*/libasound.so* # conflicts with alsa-mixin
    override-prime: |
      set -eux
      craftctl default
      cp -a /snap/core24/current/usr/lib/aarch64-linux-gnu/* usr/lib/aarch64-linux-gnu/

  
apps:
  steam:
    command: usr/bin/fex_launcher.sh
    plugs:
      - shmem
      - camera
      - desktop
      - desktop-legacy
      - wayland
      - home
      - x11
      - gsettings
      - hardware-observe
      - mount-observe
      - system-observe
      - network-observe
      - joystick
      - network
      - network-bind
      - opengl
      - audio-playback
      - audio-record
      - screen-inhibit-control
      - process-control
      - bluez
      - network-control
      - fuse-support
      - steam-support
      - removable-media
      - upower-observe
      - uinput
      - dot-local-share-steam

