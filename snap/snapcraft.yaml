  /usr/lib/aarch64-linux-gnu/libxcb.so.1:
    symlink: $SNAP/graphics/usr/lib/aarch64-linux-gnu/libxcb.so.1.1.0
  /usr/lib/aarch64-linux-gnu/gbm/dri_gbm.so:
    symlink: $SNAP/graphics/usr/lib/aarch64-linux-gnu/gbm/dri_gbm.so
  /usr/lib/aarch64-linux-gnu/libvulkan.so:
    symlink: $SNAP/graphics/usr/lib/aarch64-linux-gnu/libvulkan.so.1.3.275
  /usr/lib/aarch64-linux-gnu/libvulkan.so.1:
    symlink: $SNAP/graphics/usr/lib/aarch64-linux-gnu/libvulkan.so.1.3.275
  /usr/lib/aarch64-linux-gnu/libvulkan.so.1.3.275:
    symlink: $SNAP/graphics/usr/lib/aarch64-linux-gnu/libvulkan.so.1.3.275
  /usr/lib/aarch64-linux-gnu/libGL.so:
    symlink: $SNAP/graphics/usr/lib/aarch64-linux-gnu/libGL.so.1.7.0
  /usr/lib/aarch64-linux-gnu/libGL.so.1:
    symlink: $SNAP/graphics/usr/lib/aarch64-linux-gnu/libGL.so.1.7.0
  /usr/lib/aarch64-linux-gnu/libGL.so.1.7.0:
