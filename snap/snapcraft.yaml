  /usr/lib/aarch64-linux-gnu/libGLX.so.0:
    symlink: $SNAP/graphics/usr/lib/aarch64-linux-gnu/libGLX.so.0.0.0
  /usr/lib/aarch64-linux-gnu/libGLX.so.0.0.0:
    symlink: $SNAP/graphics/usr/lib/aarch64-linux-gnu/libGLX.so.0.0.0
  /usr/lib/aarch64-linux-gnu/libGLX_mesa.so.0:
    symlink: $SNAP/graphics/usr/lib/aarch64-linux-gnu/libGLX_mesa.so.0.0.0
  /usr/lib/aarch64-linux-gnu/libGLX_mesa.so.0.0.0:
    symlink: $SNAP/graphics/usr/lib/aarch64-linux-gnu/libGLX_mesa.so.0.0.0
  /usr/lib/aarch64-linux-gnu/libGLX_indirect.so.0:
    symlink: $SNAP/graphics/usr/lib/aarch64-linux-gnu/libGLX_mesa.so.0.0.0
  /usr/lib/aarch64-linux-gnu/libGLdispatch.so.0:
    symlink: $SNAP/graphics/usr/lib/aarch64-linux-gnu/libGLdispatch.so.0.0.0
  /usr/lib/aarch64-linux-gnu/libGLdispatch.so.0.0.0:
    symlink: $SNAP/graphics/usr/lib/aarch64-linux-gnu/libGLdispatch.so.0.0.0
  /usr/lib/aarch64-linux-gnu/libGLESv2.so.2:
    symlink: $SNAP/graphics/usr/lib/aarch64-linux-gnu/libGLESv2.so.2.1.0
  /usr/lib/aarch64-linux-gnu/libGLESv2.so.2.1.0:
    symlink: $SNAP/graphics/usr/lib/aarch64-linux-gnu/libGLESv2.so.2.1.0
  /usr/lib/libOpenGL.so.0:
    symlink: $SNAP/usr/lib/aarch64-linux-gnu/libOpenGL.so.0
  /usr/lib/libX11.so.6:
    symlink: $SNAP/usr/lib/aarch64-linux-gnu/libX11.so.6
  /usr/lib/libXau.so.6:
    symlink: $SNAP/usr/lib/aarch64-linux-gnu/libXau.so.6
  /usr/lib/libXdmcp.so.6:
    symlink: $SNAP/usr/lib/aarch64-linux-gnu/libXdmcp.so.6
  /usr/lib/libXext.so.6:
