name: steam
version: '1.0.0.85'
summary: Launcher for the Steam software distribution service
description: |
  Steam is a software distribution service with an online store, automated
  installation, automatic updates, achievements, SteamCloud synchronized
  savegame and screenshot functionality, and many social features.
adopt-info: steam
grade: stable
confinement: strict
base: core24
platforms:
  arm64:
    build-on: [arm64]
    build-for: [arm64]
compression: lzo
assumes:
  - snapd2.73

lint:
  # Snapcraft's `ldd` lint can't handle 32-bit things,
  # So just make it quiet and also make builds a surprising amount faster
  ignore:
    - library:
        - lib/i386-linux-gnu/**
        - usr/lib/i386-linux-gnu/**
        - lib32/**
        - usr/lib32/**

package-repositories:
  - type: apt
    url: http://ports.ubuntu.com/ubuntu-ports/
    suites: [noble, noble-updates]
    components: [main, universe]
    architectures: [arm64]
    key-id: F6ECB3762474EDA9D21B7022871920D1991BC93C
    key-server: keyserver.ubuntu.com
  - type: apt
    ppa: fex-emu/fex

# Most of these symlinks are required to get everything visible within
# the pressure-vessel container.
# If anything breaks when launching games through s-r-t in the future,
# use the debug-scripts to help identify which libs are not visible
# in the environment, and then add a corresponding symlink.
# We can't explicitly override pressure-vessel's LD_LIBRARY_PATH,
# but we can ensure that the select .sos that it will pick up are available
layout:
  /usr/share/drirc.d:
    bind: $SNAP/graphics/usr/share/drirc.d
  /usr/share/glvnd/egl_vendor.d:
    bind: $SNAP/graphics/usr/share/glvnd/egl_vendor.d
  /usr/lib/aarch64-linux-gnu/alsa-lib:
    bind: $SNAP/usr/lib/aarch64-linux-gnu/alsa-lib
  /usr/share/alsa:
    bind: $SNAP/usr/share/alsa
  /usr/share/X11/xkb:
    bind: $SNAP/usr/share/X11/xkb
  /usr/lib/aarch64-linux-gnu/libvulkan_intel.so:
    symlink: $SNAP/graphics/usr/lib/aarch64-linux-gnu/libvulkan_intel.so
  /usr/lib/aarch64-linux-gnu/libvulkan_radeon.so:
    symlink: $SNAP/graphics/usr/lib/aarch64-linux-gnu/libvulkan_radeon.so
  /usr/lib/aarch64-linux-gnu/libvulkan_broadcom.so:
    symlink: $SNAP/graphics/usr/lib/aarch64-linux-gnu/libvulkan_broadcom.so
  /usr/lib/aarch64-linux-gnu/libvulkan_dzn.so:
    symlink: $SNAP/graphics/usr/lib/aarch64-linux-gnu/libvulkan_dzn.so
  /usr/lib/aarch64-linux-gnu/libvulkan_asahi.so:
